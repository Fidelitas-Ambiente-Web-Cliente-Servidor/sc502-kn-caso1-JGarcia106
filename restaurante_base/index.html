<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Ficticio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">

    <h1 class="text-center mb-4">Restaurante Ficticio</h1>

    <section>
        <h2>Menú</h2>

        <div class="mb-3">
            <button class="btn btn-dark filtro activo" onclick="filtrarCategoria('Todos')">Todos</button>
            <button class="btn btn-outline-dark filtro" onclick="filtrarCategoria('Entrada')">Entradas</button>
            <button class="btn btn-outline-dark filtro" onclick="filtrarCategoria('Plato Fuerte')">Platos Fuertes</button>
            <button class="btn btn-outline-dark filtro" onclick="filtrarCategoria('Postre')">Postres</button>
        </div>

        <div id="contenedorMenu" class="row"></div>
    </section>

    <hr class="my-5">

    <section>
        <h2>Reservas</h2>

        <form id="form-reserva">

            <div class="mb-3">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" class="form-control">
                <div id="errorNombre" class="error-campo"></div>
            </div>

            <div class="mb-3">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" class="form-control">
                <div id="errorCorreo" class="error-campo"></div>
            </div>

            <div class="mb-3">
                <label>Fecha Reserva</label>
                <input type="date" id="fecha" class="form-control">
                <div id="errorFecha" class="error-campo"></div>
            </div>

            <div class="mb-3">
                <label>Hora</label>
                <select id="hora" class="form-control">
                    <option value="">Seleccione</option>
                    <option>12:00</option>
                    <option>13:00</option>
                    <option>18:00</option>
                    <option>19:00</option>
                    <option>20:00</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Número de Personas</label>
                <input type="number" id="personas" class="form-control">
                <div id="errorPersonas" class="error-campo"></div>
            </div>

            <div class="mb-3">
                <label>Comentarios</label>
                <textarea id="comentarios" class="form-control"></textarea>
            </div>

            <button id="btnEnviar" type="submit" class="btn btn-primary" disabled>
                Registrar Reserva
            </button>

        </form>

        <hr>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Personas</th>
                </tr>
            </thead>
            <tbody id="tablaReservas"></tbody>
        </table>

        <div id="resumen" class="resumen-reservas"></div>

    </section>

</div>

<script src="js/app.js"></script>

</body>
</html>
